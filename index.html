<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Garros Gong</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Academic homepage for Garros Gong, a Management Science researcher studying decisions under uncertainty."
    />
    <meta
      name="keywords"
      content="Management Science, operations management, academic homepage, decision support, applied economics"
    />
    <meta name="author" content="Garros Gong" />

    <link
      href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=Source+Sans+3:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.7.2/animate.min.css"
    />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script type="module" src="index.js"></script>
  </head>
  <body>
    <div id="colorlib-page">
      <div class="container-wrap">
        <a
          href="#"
          class="js-colorlib-nav-toggle colorlib-nav-toggle"
          data-toggle="collapse"
          data-target="#navbar"
          aria-expanded="false"
          aria-controls="navbar"
          ><i></i
        ></a>

        <aside
          id="colorlib-aside"
          role="complementary"
          class="border js-fullheight no-print"
        >
          <div class="sidebar-shell">
            <div class="author-img">
              <img id="profile-img" src="garros.jpg" alt="Garros Gong" />
            </div>

            <div class="sidebar-copy">
              <h1 id="colorlib-logo">
                <a href="./index.html" id="sidebar-name">Garros Gong</a>
              </h1>
              <span class="position" id="sidebar-title"
                >PhD Researcher in Management Science</span
              >
              <span class="position" id="sidebar-meta"
                >University of Waterloo | Toronto, ON, Canada</span
              >
              <p id="sidebar-tagline" class="sidebar-tagline">
                Research on operations, markets, and AI-enabled decision support.
              </p>
            </div>

            <div id="sidebar-actions" class="sidebar-actions"></div>

            <nav id="colorlib-main-menu" role="navigation" class="navbar">
              <div id="navbar" class="collapse">
                <ul>
                  <li class="active"><a href="#" data-nav-section="about">About</a></li>
                  <li><a href="#" data-nav-section="publications">Publications</a></li>
                  <li><a href="#" data-nav-section="media">Media</a></li>
                  <li><a href="#" data-nav-section="experience">Experience</a></li>
                </ul>
              </div>
            </nav>

            <div class="colorlib-footer">
              <div class="footer-label">Connect</div>
              <ul id="sidebar-links"></ul>
            </div>
          </div>
        </aside>

        <main id="colorlib-main">
          <section class="page-section hero-section" data-section="about">
            <div class="section-shell">
              <div id="collab-cta"></div>
              <div id="hero"></div>
              <div id="education"></div>
            </div>
          </section>

          <section class="page-section" data-section="publications">
            <div class="section-shell">
              <div id="featured-publications"></div>
            </div>
          </section>

          <section class="page-section" data-section="media">
            <div class="section-shell">
              <div id="media"></div>
            </div>
          </section>

          <section class="page-section page-section-last" data-section="experience">
            <div class="section-shell">
              <div id="experience"></div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/waypoints/4.0.1/jquery.waypoints.min.js"></script>
    <script src="js/main.js"></script>

    <div id="collab-modal" class="collab-modal" aria-hidden="true">
      <div class="collab-modal-overlay" data-modal-close></div>
      <div
        class="collab-modal-content"
        role="dialog"
        aria-modal="true"
        aria-labelledby="collab-modal-title"
      >
        <button
          type="button"
          class="collab-modal-close"
          aria-label="Close"
          data-modal-close
        >
          &times;
        </button>
        <h3 id="collab-modal-title">Leave a message</h3>

        <div class="collab-field">
          <label>Recipient</label>
          <div class="collab-recipient-toggle">
            <button type="button" class="recipient-btn" data-recipient="academic">
              <i class="fa fa-graduation-cap"></i>
              Academic
            </button>
            <button type="button" class="recipient-btn" data-recipient="personal">
              <i class="fa fa-user"></i>
              Personal
            </button>
          </div>
        </div>

        <div class="collab-field">
          <label for="collab-subject">Subject</label>
          <input id="collab-subject" type="text" />
        </div>

        <div class="collab-field">
          <label for="collab-message">Message</label>
          <textarea id="collab-message" rows="6"></textarea>
        </div>

        <div class="collab-actions modal-actions">
          <button type="button" class="collab-btn" id="collab-send">
            <i class="fa fa-envelope"></i>
            Open Email Client
          </button>
          <button type="button" class="collab-btn secondary" id="collab-copy-email">
            <i class="fa fa-copy"></i>
            Copy Email
          </button>
          <button type="button" class="collab-btn secondary" id="collab-copy-message">
            <i class="fa fa-clipboard"></i>
            Copy Message
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
